# Name of this GitHub Actions workflow (appears in the Actions tab of the repo)
name: Playwright Tests

# ── TRIGGERS ────────────────────────────────────────────────────────────
# "on" defines WHEN this workflow runs.
on:
  # push:
  #   # Run the workflow whenever code is pushed to 'main' or 'master' branch
  #   branches: [ main, master ]
  # pull_request:
  #   # Also run when a pull request targets 'main' or 'master'
  #   branches: [ main, master ]

# ── JOBS ────────────────────────────────────────────────────────────────
# A workflow is made up of one or more jobs. Here we have a single job called "test".
jobs:
  test:
    # Cancel the job automatically if it runs longer than 60 minutes
    timeout-minutes: 60

    # Use a GitHub-hosted runner with the latest Ubuntu image
    runs-on: ubuntu-latest

    # ── STEPS ─────────────────────────────────────────────────────────
    # Steps run sequentially inside the job. Each step is either a
    # reusable action (uses:) or a shell command (run:).
    steps:

    # 1. Check out the repository code so subsequent steps can access it
    - uses: actions/checkout@v4

    # 2. Set up Node.js (required by Playwright and npm).
    #    "lts/*" picks the latest Long-Term-Support version automatically.
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 3. Install project dependencies from package-lock.json.
    #    "npm ci" is a clean install — faster and stricter than "npm install".
    - name: Install dependencies
      run: npm ci

    # 4. Download the browser binaries (Chromium, Firefox, WebKit) that
    #    Playwright needs. "--with-deps" also installs OS-level libraries
    #    required by those browsers on the Ubuntu runner.
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 5. Execute the Playwright test suite.
    #    By default this reads playwright.config.ts for project settings.
    - name: Run Playwright tests
      run: npx playwright test

    # 6. Upload the HTML test report as a build artifact so it can be
    #    downloaded later from the Actions run summary page.
    #    "if: ${{ !cancelled() }}" ensures the report is uploaded even
    #    when tests fail (but NOT if the workflow is manually cancelled).
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        # Name shown in the Artifacts section of the workflow run
        name: playwright-report
        # Local folder produced by Playwright's HTML reporter
        path: playwright-report/
        # GitHub will automatically delete this artifact after 30 days
        retention-days: 30